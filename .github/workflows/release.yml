name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create GitHub Releases and upload artifacts

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_flag: --win
          - os: macos-latest
            build_flag: --mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and publish
        run: bun run build && bunx electron-builder ${{ matrix.build_flag }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip Mac code signing — users will see "unidentified developer" on first launch
          # (right-click > Open to bypass). Remove these lines once you have an Apple
          # Developer certificate configured in repository secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: false
